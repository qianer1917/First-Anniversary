<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回忆星系</title>

<style>

/* 🌸 東竹字體 */
@font-face{
    font-family:"DongZhu";
    src:url("./DongZhu.ttf") format("truetype");
}

/* 🌌 全域 */
body{
    margin:0;
    padding:0;

    width:100%;
    height:100vh;

    background:black;
    color:white;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"DongZhu","Noto Serif TC",serif;
}

/* 🌌 場景 */
.scene{
    position:absolute;

    width:100%;
    height:100%;

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    text-align:center;

    padding:30px;
    box-sizing:border-box;
}

/* 🌌 啟用中的場景 */
.scene.active{
    display:flex;
}

/* 🌌 發光 */
.glow{
    text-shadow:
        0 0 10px #ffffff,
        0 0 20px #66ccff,
        0 0 40px #66ccff;
}

/* 🌌 打字動畫 */
.typing{
    overflow:hidden;
    white-space:nowrap;
    border-right:2px solid white;

    animation:
        typing 2.5s steps(30,end),
        blink 0.7s infinite;
}

@keyframes typing{
    from{
        width:0;
    }

    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

/* 🌌 提示文字 */
.tip{
    margin-top:20px;
    opacity:0.7;
    font-size:14px;
}

</style>
</head>

<!-- 🌌 點任意地方切換 -->
<body onclick="nextScene()">

<!-- 🌌 Scene 1 -->
<div class="scene active">

    <h1 class="glow">
        本沉浸式系统已开启
    </h1>

    <p>
        视觉影像生成中...
    </p>

    <div class="tip">
        点击任意位置继续
    </div>

</div>

<!-- 🌌 Scene 2 -->
<div class="scene">

    <h2 class="glow typing">
        您已进入船舱
    </h2>

</div>

<!-- 🌌 Scene 3 -->
<div class="scene">

    <h2 class="glow typing">
        正在连接系统核心...
    </h2>

</div>

<!-- 🌌 Scene 4 -->
<div class="scene">

    <h2 class="glow">
        欢迎星航共乘者
    </h2>

</div>

<!-- 🌌 Scene 5 -->
<div class="scene">

    <h2 class="glow">
        您好！我是小奈领航员
    </h2>

    <p>
        很高兴能与你一同探险
    </p>

</div>

<!-- 🌌 Scene 6 -->
<div class="scene">

    <h2 class="glow typing">
        正在步入星际轨道...
    </h2>

</div>

<!-- 🌌 Scene 7 -->
<div class="scene">

    <h2 class="glow">
        探索中...
    </h2>

</div>

<!-- 🌌 Scene 8 -->
<div class="scene">

    <h2 class="glow">
        已进入稳定航行模式
    </h2>

</div>

<!-- 🌌 Scene 9 -->
<div class="scene">

    <h2 class="glow">
        正在进入回忆星系范围...
    </h2>

</div>

<!-- 🌌 Scene 10 -->
<div class="scene">

    <h2 class="glow">
        欢迎踏入回忆星系
    </h2>

</div>

<!-- 🌌 Scene 11 -->
<div class="scene">

    <h2 class="glow">
        记得今天是什么日子吗？
    </h2>

</div>

<!-- 🌌 Scene 12 -->
<div class="scene">

    <h1 class="glow">
        今天是我们一周年的纪念日
    </h1>

    <p>
        很感谢一路辛苦走来的我们
    </p>

</div>

<!-- 🌌 Scene 13 -->
<div class="scene">

    <h2 class="glow">
        坚定选择对方的我们
    </h2>

</div>

<!-- 🌌 Scene 14 -->
<div class="scene">

    <h2 class="glow">
        让我们一起欣赏拼图吧
    </h2>

    <p>
        第一片 / 第二片 / 第三片
        <br><br>
        第四片 / 第五片 / 第六片
    </p>

</div>

<!-- 🌌 Scene 15 -->
<div class="scene">

    <h2 class="glow typing">
        小奈说：我们还要一起走，好久好久
    </h2>

</div>

<script>

let index = 0;

const scenes = document.querySelectorAll(".scene");

/* 🌌 切換場景 */
function nextScene(){

    /* 最後一頁停止 */
    if(index >= scenes.length - 1){
        return;
    }

    /* 隱藏目前 */
    scenes[index].classList.remove("active");

    /* 下一頁 */
    index++;

    /* 顯示下一頁 */
    scenes[index].classList.add("active");
}

</script>

</body>
</html>
