<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>回忆星系</title>

<style>

/* 🌌 東竹字體（你要有字體檔才會生效） */
@font-face{
    font-family:"DongZhu";
    src:url("./DongZhu.ttf");
}

/* 🌌 全域 */
body{
    margin:0;
    background:black;
    color:white;
    overflow:hidden;

    /* 有東竹就用東竹，沒有就用備用 */
    font-family:"DongZhu","Noto Sans TC",sans-serif;
}

/* 🌌 每個場景 */
.scene{
    position:absolute;
    width:100%;
    height:100%;

    /* 先隱藏 */
    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    text-align:center;
    padding:20px;
    box-sizing:border-box;
}

/* 🌌 顯示中的場景 */
.scene.active{
    display:flex;
}

/* 🌌 發光文字 */
.glow{
    text-shadow:
        0 0 10px #ffffff,
        0 0 20px #66ccff,
        0 0 40px #66ccff;
}

/* 🌌 打字效果 */
.typing{
    overflow:hidden;
    white-space:nowrap;
    border-right:2px solid white;

    animation:
        typing 2.5s steps(30,end),
        blink 0.7s infinite;
}

@keyframes typing{
    from{
        width:0;
    }
    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

/* 🌌 按鈕 */
.btn{
    margin-top:25px;
    padding:12px 24px;

    background:transparent;
    border:1px solid white;

    color:white;
    font-size:16px;

    cursor:pointer;

    transition:0.3s;
}

.btn:hover{
    background:white;
    color:black;
}

/* 🌌 星空背景 */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
    background:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        black;

    background-size:50px 50px,100px 100px;
    background-position:0 0,25px 25px;
}

</style>
</head>

<body>

<!-- 🌌 星空 -->
<div class="stars"></div>

<!-- 🌌 Scene 1 -->
<div class="scene active">
    <h1 class="glow">本沉浸式系统已开启</h1>

    <p>视觉影像生成中...</p>

    <button class="btn" onclick="nextScene()">
        进入
    </button>
</div>

<!-- 🌌 Scene 2 -->
<div class="scene">
    <h2 class="glow typing">
        您已进入船舱
    </h2>
</div>

<!-- 🌌 Scene 3 -->
<div class="scene">
    <h2 class="glow typing">
        正在连接系统核心...
    </h2>
</div>

<!-- 🌌 Scene 4 -->
<div class="scene">
    <h2 class="glow">
        欢迎星航共乘者
    </h2>
</div>

<!-- 🌌 Scene 5 -->
<div class="scene">
    <h2 class="glow">
        您好！我是小奈领航员
    </h2>

    <p>
        很高兴能与你一同探险
    </p>
</div>

<!-- 🌌 Scene 6 -->
<div class="scene">
    <h2 class="glow typing">
        正在步入星际轨道...
    </h2>
</div>

<!-- 🌌 Scene 7 -->
<div class="scene">
    <h2 class="glow">
        探索中...
    </h2>
</div>

<!-- 🌌 Scene 8 -->
<div class="scene">
    <h2 class="glow">
        已进入稳定航行模式
    </h2>
</div>

<!-- 🌌 Scene 9 -->
<div class="scene">
    <h2 class="glow">
        正在进入回忆星系范围...
    </h2>
</div>

<!-- 🌌 Scene 10 -->
<div class="scene">
    <h2 class="glow">
        欢迎踏入回忆星系
    </h2>
</div>

<!-- 🌌 Scene 11 -->
<div class="scene">
    <h2 class="glow">
        记得今天是什么日子吗？
    </h2>
</div>

<!-- 🌌 Scene 12 -->
<div class="scene">
    <h1 class="glow">
        今天是我们一周年的纪念日
    </h1>

    <p>
        很感谢一路辛苦走来的我们
    </p>
</div>

<!-- 🌌 Scene 13 -->
<div class="scene">
    <h2 class="glow">
        坚定选择对方的我们
    </h2>
</div>

<!-- 🌌 Scene 14 -->
<div class="scene">
    <h2 class="glow">
        让我们一起欣赏拼图吧
    </h2>

    <p>
        第一片 / 第二片 / 第三片 /
        第四片 / 第五片 / 第六片
    </p>
</div>

<!-- 🌌 Scene 15 -->
<div class="scene">
    <h2 class="glow typing">
        小奈说：我们还要一起走，好久好久
    </h2>
</div>

<script>

let index = 0;

const scenes = document.querySelectorAll(".scene");

/* 🌌 切換場景 */
function nextScene(){

    /* 隱藏目前 */
    scenes[index].classList.remove("active");

    /* 下一頁 */
    index++;

    /* 防止超出 */
    if(index >= scenes.length){
        index = scenes.length - 1;
    }

    /* 顯示下一頁 */
    scenes[index].classList.add("active");
}

</script>

</body>
</html>
