<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>回忆星系</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family: Arial, "Noto Sans TC", sans-serif;
    overflow:hidden;
}

/* 每一幕 */
.scene{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity 1s ease;
}

/* 只顯示 active */
.scene.active{
    opacity:1;
}

/* 發光文字 */
.glow{
    text-shadow:0 0 10px #fff, 0 0 20px #66ccff;
}

/* 按鈕 */
.btn{
    margin-top:20px;
    padding:10px 18px;
    border:1px solid white;
    background:transparent;
    color:white;
    cursor:pointer;
}

/* 打字效果 */
.typing{
    overflow:hidden;
    white-space:nowrap;
    border-right:2px solid white;
    width:0;
    animation:typing 2s steps(20,end) forwards, blink 0.7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}
</style>
</head>

<body>

<!-- 🌌 Scene 1 -->
<div class="scene active">
    <h1 class="glow">本沉浸式系统已开启</h1>
    <p>视觉影像生成中...</p>
    <button class="btn" onclick="nextScene()">进入</button>
</div>

<!-- 🌌 Scene 2 -->
<div class="scene">
    <h2 class="glow typing">您已进入船舱</h2>
</div>

<!-- 🌌 Scene 3 -->
<div class="scene">
    <h2 class="glow typing">正在连接系统核心...</h2>
</div>

<!-- 🌌 Scene 4 -->
<div class="scene">
    <h2 class="glow">欢迎星航共乘者</h2>
</div>

<!-- 🌌 Scene 5 -->
<div class="scene">
    <h2 class="glow">我是小奈领航员</h2>
</div>

<!-- 🌌 Scene 6 -->
<div class="scene">
    <h2 class="glow typing">正在步入星际轨道...</h2>
</div>

<!-- 🌌 Scene 7 -->
<div class="scene">
    <h2 class="glow">探索中...</h2>
</div>

<!-- 🌌 Scene 8 -->
<div class="scene">
    <h2 class="glow">已进入稳定航行模式</h2>
</div>

<!-- 🌌 Scene 9 -->
<div class="scene">
    <h2 class="glow">正在进入回忆星系...</h2>
</div>

<!-- 🌌 Scene 10 -->
<div class="scene">
    <h2 class="glow">欢迎踏入回忆星系</h2>
</div>

<!-- 🌌 Scene 11 -->
<div class="scene">
    <h2 class="glow">记得今天是什么日子吗？</h2>
</div>

<!-- 🌌 Scene 12 -->
<div class="scene">
    <h1 class="glow">今天是一周年纪念日</h1>
    <p>谢谢一路走来的我们</p>
</div>

<!-- 🌌 Scene 13 -->
<div class="scene">
    <h2 class="glow">我们还要一起走很久</h2>
</div>

<script>
let index = 0;
const scenes = document.querySelectorAll(".scene");

function nextScene(){

    // 安全檢查
    if(index >= scenes.length) return;

    // 目前消失
    scenes[index].classList.remove("active");

    // 下一頁
    index++;

    // 防止超界
    if(index >= scenes.length){
        index = scenes.length - 1;
        return;
    }

    scenes[index].classList.add("active");
}
</script>

</body>
</html>
