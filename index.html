<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>回忆星系</title>

<style>

/* 🌸 字體 */
@font-face{
    font-family:"DongZhu";
    src:url("./DongZhu.ttf") format("truetype");
}

/* 🌌 全域 */
body{
    margin:0;
    width:100%;
    height:100vh;

    overflow:hidden;

    background:black;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:
    "DongZhu",
    "Noto Serif TC",
    serif;
}

/* 🌌 星點 */
body::before{
    content:"";

    position:fixed;
    inset:0;

    background-image:
    radial-gradient(
    #ffe8a3 1px,
    transparent 1px);

    background-size:55px 55px;

    opacity:.22;

    animation:
    starsMove 30s linear infinite;
}

@keyframes starsMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(55px);
    }
}

/* 🌠 流星 */
body::after{
    content:"";

    position:fixed;

    top:-20%;
    left:-20%;

    width:2px;
    height:220px;

    background:
    linear-gradient(
    to bottom,
    transparent,
    #ffe6a0,
    transparent);

    transform:rotate(-35deg);

    opacity:.7;

    animation:
    meteor 7s linear infinite;
}

@keyframes meteor{

    0%{
        transform:
        translate(0,0)
        rotate(-35deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translate(140vw,140vh)
        rotate(-35deg);

        opacity:0;
    }
}

/* 🌌 場景 */
.scene{

    position:absolute;

    width:100%;
    height:100%;

    display:none;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:30px;

    box-sizing:border-box;
}

.scene.active{
    display:flex;
}

/* 🌌 主文字 */
h1{

    margin:0;

    color:white;

    font-size:
    clamp(24px,4vw,52px);

    font-weight:normal;

    white-space:nowrap;

    overflow:hidden;

    text-shadow:
    0 0 10px #fff4c2,
    0 0 25px #ffd76a,
    0 0 40px #ffd76a;
}

/* 🌌 印刷輸入 */
.typing{

    display:inline-block;

    width:0;

    border-right:
    2px solid white;

    animation:
    typing 2.8s steps(30,end) forwards,
    blink .7s infinite;
}

@keyframes typing{

    from{
        width:0;
    }

    to{
        width:100%;
    }
}

@keyframes blink{

    50%{
        border-color:transparent;
    }
}

/* 🌌 手機 */
@media(max-width:768px){

    h1{

        font-size:
        clamp(18px,5vw,28px);

        transform:scale(.92);
    }
}

</style>
</head>

<body onclick="nextScene()">

<div class="scene active">
<h1 class="typing">
本沉浸式系统已开启
</h1>
</div>

<div class="scene">
<h1 class="typing">
视觉影像生成中...
</h1>
</div>

<div class="scene">
<h1 class="typing">
您已进入船舱
</h1>
</div>

<div class="scene">
<h1 class="typing">
正在连接系统核心...
</h1>
</div>

<div class="scene">
<h1 class="typing">
欢迎星航共乘者
</h1>
</div>

<div class="scene">
<h1 class="typing">
您好！我是小奈领航员
</h1>
</div>

<div class="scene">
<h1 class="typing">
正在步入星际轨道...
</h1>
</div>

<div class="scene">
<h1 class="typing">
状态稳定
</h1>
</div>

<div class="scene">
<h1 class="typing">
距离正在缩短
</h1>
</div>

<div class="scene">
<h1 class="typing">
正在进入回忆星系范围...
</h1>
</div>

<div class="scene">
<h1 class="typing">
欢迎踏入回忆星系
</h1>
</div>

<div class="scene">
<h1 class="typing">
记得今天是什么日子吗？
</h1>
</div>

<div class="scene">
<h1 class="typing">
今天是我们一周年的纪念日
</h1>
</div>

<div class="scene">
<h1 class="typing">
坚定选择对方的我们
</h1>
</div>

<div class="scene">
<h1 class="typing">
让我们一起欣赏拼图吧
</h1>
</div>

<div class="scene">
<h1 class="typing">
小奈说：我们还要一起走，好久好久...
</h1>
</div>

<div class="scene">
<h1 class="typing">
最后，感谢你来到这个网站
</h1>
</div>

<script>

let index = 0;

const scenes =
document.querySelectorAll(".scene");

function restartTyping(scene){

    const text =
    scene.querySelector(".typing");

    text.style.animation = "none";

    void text.offsetWidth;

    text.style.animation =
    "typing 2.8s steps(30,end) forwards, blink .7s infinite";
}

function nextScene(){

    if(index >= scenes.length - 1){
        return;
    }

    scenes[index]
    .classList.remove("active");

    index++;

    scenes[index]
    .classList.add("active");

    restartTyping(
    scenes[index]);
}

/* 🌌 首頁先播放 */
restartTyping(
scenes[0]);

</script>

</body>
</html>
