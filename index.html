<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>回忆星系</title>

<style>

/* 🌸 東竹字體 */
@font-face{
    font-family:"DongZhu";
    src:url("./DongZhu.ttf") format("truetype");
}

/* 🌌 全域 */
body{
    margin:0;
    padding:0;

    width:100%;
    height:100vh;

    overflow:hidden;

    background:black;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"DongZhu","Noto Serif TC",serif;
}

/* 🌌 金色星點 */
body::before{
    content:"";

    position:fixed;
    inset:0;

    background-image:
        radial-gradient(#ffe8a3 1px, transparent 1px);

    background-size:50px 50px;

    opacity:.25;

    animation:starsMove 25s linear infinite;
}

/* 🌠 流星 */
body::after{
    content:"";

    position:fixed;

    top:-10%;
    left:-10%;

    width:2px;
    height:180px;

    background:linear-gradient(
        to bottom,
        rgba(255,230,150,0),
        rgba(255,230,150,.9),
        rgba(255,230,150,0)
    );

    transform:rotate(-35deg);

    animation:meteor 6s linear infinite;
}

@keyframes meteor{
    0%{
        transform:
        translate(0,0)
        rotate(-35deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translate(130vw,130vh)
        rotate(-35deg);

        opacity:0;
    }
}

@keyframes starsMove{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(50px);
    }
}

/* 🌌 場景 */
.scene{
    position:absolute;

    width:100%;
    height:100%;

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    text-align:center;

    padding:25px;
    box-sizing:border-box;
}

/* 🌌 顯示 */
.scene.active{
    display:flex;
}

/* 🌌 發光 */
.glow{
    text-shadow:
        0 0 10px #fff4c2,
        0 0 20px #ffd76a,
        0 0 40px #ffd76a;
}

/* 🌌 打字動畫 */
.typing{
    display:inline-block;

    overflow:hidden;

    white-space:nowrap;

    border-right:2px solid white;

    width:0;

    animation:
        typing 2.5s steps(30,end) forwards,
        blink .7s infinite;
}

@keyframes typing{
    from{
        width:0;
    }

    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

/* 🌌 向上浮現 */
.floatUp{
    opacity:0;

    transform:translateY(40px);

    animation:floatUp 1.5s ease forwards;
}

@keyframes floatUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 🌌 閃爍 */
.flash{
    animation:flash 1s infinite;
}

@keyframes flash{
    50%{
        opacity:.3;
    }
}

/* 🌌 字 */
h1,h2{
    line-height:1.6;
    max-width:90%;
}

h1{
    font-size:48px;
}

h2{
    font-size:36px;
}

/* 🌌 手機 */
@media(max-width:768px){

    h1{
        font-size:30px;
    }

    h2{
        font-size:22px;
    }

    .typing{

        white-space:normal;

        word-break:break-word;

        width:100%;

        border-right:none;
    }
}

</style>
</head>

<body onclick="nextScene()">

<!-- 1 -->
<div class="scene active">
    <h1 class="glow">
        本沉浸式系统已开启
    </h1>
</div>

<!-- 2 -->
<div class="scene">
    <h2 class="glow typing">
        视觉影像生成中...
    </h2>
</div>

<!-- 3 -->
<div class="scene">
    <h2 class="glow typing">
        您已进入船舱
    </h2>
</div>

<!-- 4 -->
<div class="scene">
    <h2 class="glow typing">
        正在连接系统核心...
    </h2>
</div>

<!-- 5 -->
<div class="scene">
    <h2 class="glow">
        欢迎星航共乘者
    </h2>
</div>

<!-- 6 -->
<div class="scene">
    <h2 class="glow">
        您好！我是小奈领航员
    </h2>
</div>

<!-- 7 -->
<div class="scene">
    <h2 class="glow typing">
        正在步入星际轨道...
    </h2>
</div>

<!-- 8 -->
<div class="scene">
    <h2 class="glow floatUp">
        状态稳定
    </h2>
</div>

<!-- 9 -->
<div class="scene">
    <h2 class="glow floatUp">
        距离正在缩短
    </h2>
</div>

<!-- 10 -->
<div class="scene">
    <h2 class="glow typing">
        正在进入回忆星系范围...
    </h2>
</div>

<!-- 11 -->
<div class="scene">
    <h2 class="glow">
        欢迎踏入回忆星系
    </h2>
</div>

<!-- 12 -->
<div class="scene">
    <h2 class="glow">
        记得今天是什么日子吗？
    </h2>
</div>

<!-- 13 -->
<div class="scene">
    <h1 class="glow">
        今天是我们一周年的纪念日
    </h1>
</div>

<!-- 14 -->
<div class="scene">
    <h2 class="glow">
        坚定选择对方的我们
    </h2>
</div>

<!-- 15 -->
<div class="scene">
    <h2 class="glow typing">
        小奈说：我们还要一起走，好久好久...
    </h2>
</div>

<!-- 16 -->
<div class="scene">
    <h2 class="glow typing">
        最后，感谢你来到这个网站
    </h2>

    <div class="flash glow"
    style="margin-top:20px;font-size:20px;">
        ■ WEBSITE CONNECTED ■
    </div>
</div>

<script>

let index = 0;

const scenes =
document.querySelectorAll(".scene");

function nextScene(){

    if(index >= scenes.length - 1){
        return;
    }

    scenes[index]
    .classList.remove("active");

    index++;

    scenes[index]
    .classList.add("active");

    /* 🌌 重播 typing */
    const typing =
    scenes[index]
    .querySelector(".typing");

    if(typing){

        typing.style.animation="none";

        void typing.offsetWidth;

        typing.style.animation=
        "typing 2.5s steps(30,end) forwards, blink .7s infinite";
    }
}

</script>

</body>
</html>
