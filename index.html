<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>回忆星系</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family: "Noto Sans TC", Arial, sans-serif;
    overflow:hidden;
}

/* 如果你有字體檔，把檔名放這裡 */
@font-face {
    font-family: "CustomFont";
    src: url("./font.ttf"); /* ← 你之後把字體檔改名放這裡 */
}

.scene{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity 1s ease;
}

.scene.active{
    opacity:1;
}

.glow{
    text-shadow:0 0 10px white, 0 0 20px #66ccff;
}

.btn{
    margin-top:20px;
    padding:10px 18px;
    border:1px solid white;
    background:transparent;
    color:white;
    cursor:pointer;
}

/* 打字效果 */
.typing{
    overflow:hidden;
    white-space:nowrap;
    border-right:2px solid white;
    width:0;
    animation:typing 2s steps(20,end) forwards, blink 0
